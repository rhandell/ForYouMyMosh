<!DOCTYPE html>
<html>
<head>

    <title>Monthsary 💜</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- 🌸 BACKGROUND -->
    <div class="bg" id="bg"></div>

    <!-- 💜 MAIN -->
    <div class="container">

        <!-- ✉️ ENVELOPE -->
        <div id="envelope" onclick="openEnvelope()">

            <!-- 💌 PAPER -->
            <div class="letter"></div>

            <!-- ENVELOPE PARTS -->
            <div class="front"></div>

            <div class="flap"></div>

            <div class="left"></div>

            <div class="right"></div>

            <!-- ❤️ HEART SEAL -->
            <div class="heart">❤️</div>

        </div>

        <!-- 💜 CLICK TEXT -->
        <div id="hint">💜 Click the envelope 💜</div>

        <!-- 💌 MESSAGE -->
        <div id="message">

            <h2>HAPPY MONTHSARY MOSH ❤️❤️❤️</h2>

            <p id="typingText"></p>

            <h3>🌸 No matter how many months pass, I’ll still choose you MOSH. 🌸</h3>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
